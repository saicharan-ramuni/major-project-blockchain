<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Hospital Registry | Healthcare IoT</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    
    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/static/css/style.css" rel="stylesheet">
    

</head>

<body>
    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a href="#" class="navbar-brand d-flex align-items-center">
                <h4 class="m-0"><i class="fa fa-shield-halved me-3"></i>Admin Portal</h4>
            </a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <div class="navbar-nav ms-auto ps-4">
                    <a href="AddDoctor" class="nav-item nav-link">Add Doctor</a>
                    <a href="ViewHospitalDetails" class="nav-item nav-link active">View Hospitals</a>
                    <a href="index" class="btn btn-outline-danger ms-lg-3 mt-2 mt-lg-0 px-4" style="border-radius: 50px;">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Navbar End -->

    <div class="container section-padding">
        <div class="section-title animate-up">
            <h2>Medical Provider <span style="color: var(--primary);">Registry</span></h2>
            <p class="text-secondary">Comprehensive list of all doctors and hospitals registered on the blockchain network</p>
            <div class="divider"></div>
        </div>

        <div class="table-responsive table-glass animate-up delay-1">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>Doctor Name</th>
                        <th>Password</th>
                        <th>Contact</th>
                        <th>Email</th>
                        <th>Address</th>
                        <th>Qualification</th>
                        <th>Experience</th>
                        <th>Hospital</th>
                    </tr>
                </thead>
                <tbody>
                    {{data|safe}}
                </tbody>
            </table>
        </div>
        
        <div class="text-center mt-5">
            <a href="AdminScreen" class="text-secondary text-decoration-none small"><i class="fa fa-arrow-left me-2"></i>Return to Dashboard</a>
        </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
