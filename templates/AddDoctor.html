<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Add Doctor | Healthcare IoT</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    
    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/static/css/style.css" rel="stylesheet">
    
    <script>
        function checkEmail(t3) {
            if (/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(t3)){
                return (true)
            }
            alert("Invalid E-mail Address! Please re-enter.")
            return (false);
        }
        function validate(formObj){
            if(formObj.t1.value.length==0){
                alert("Please Enter username");
                formObj.t1.focus();
                return false;
            }
            if(formObj.t2.value.length==0){
                alert("Please Enter password");
                formObj.t2.focus();
                return false;
            }
            if(formObj.t3.value.length==0){
                alert("Please Enter Email ID");
                formObj.t3.focus();
                return false;
            }
            if(!checkEmail(formObj.t3.value)){
                formObj.t3.focus();
                return false;
            }
            if(formObj.t4.value.length==0){
                alert("Please enter contact no");
                formObj.t4.focus();
                return false;
            }
            if(isNaN(formObj.t4.value)){
                alert("Contact no must be numeric");
                formObj.t4.focus();
                return false;
            }
            if(formObj.t4.value.length != 10){
                alert("Contact number must be 10 digits long");
                formObj.t4.focus();
                return false;
            }
            if(formObj.t5.value.length==0){
                alert("Please enter qualification");
                formObj.t5.focus();
                return false;
            }	
            if(formObj.t6.value.length==0){
                alert("Please enter experience");
                formObj.t6.focus();
                return false;
            }	
            if(formObj.t7.value.length==0){
                alert("Please enter hospital name");
                formObj.t7.focus();
                return false;
            }	
            if(formObj.t8.value.length==0){
                alert("Please enter address");
                formObj.t8.focus();
                return false;
            }	
            return true;
        }
    </script>
</head>

<body>
    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a href="#" class="navbar-brand d-flex align-items-center">
                <h4 class="m-0"><i class="fa fa-shield-halved me-3"></i>Admin Portal</h4>
            </a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <div class="navbar-nav ms-auto ps-4">
                    <a href="AddDoctor" class="nav-item nav-link active">Add Doctor</a>
                    <a href="ViewHospitalDetails" class="nav-item nav-link">View Hospitals</a>
                    <a href="index" class="btn btn-outline-danger ms-lg-3 mt-2 mt-lg-0 px-4" style="border-radius: 50px;">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Navbar End -->

    <div class="auth-wrapper py-5">
        <div class="glass-panel auth-card animate-up" style="max-width: 800px;">
            <div class="text-center mb-5">
                <div class="icon-box mx-auto">
                    <i class="fa fa-user-md fa-2x"></i>
                </div>
                <h3 class="mt-3">Medical Provider Registration</h3>
                <p class="text-secondary">Onboard new doctors and hospitals to the secure registry</p>
                {% if data %}
                <div class="alert alert-info bg-transparent border-info text-info py-2 mt-3" role="alert">
                    {{ data|safe }}
                </div>
                {% endif %}
            </div>

            <form name="f1" method="post" action='/AddDoctorAction' onsubmit="return validate(this);">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="t1">Username</label>
                        <input type="text" name="t1" id="t1" class="form-control form-control-custom" placeholder="Choose provider username">
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="t2">Password</label>
                        <input type="password" name="t2" id="t2" class="form-control form-control-custom" placeholder="Set secure password">
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="t3">Email Address</label>
                        <input type="email" name="t3" id="t3" class="form-control form-control-custom" placeholder="provider@hospital.com">
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="t4">Contact Number</label>
                        <input type="text" name="t4" id="t4" class="form-control form-control-custom" placeholder="10-digit number">
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="t5">Professional Qualification</label>
                        <input type="text" name="t5" id="t5" class="form-control form-control-custom" placeholder="e.g. MBBS, MD">
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="t6">Experience (Years)</label>
                        <input type="text" name="t6" id="t6" class="form-control form-control-custom" placeholder="Years of practice">
                    </div>
                    <div class="col-12 mb-4">
                        <label for="t7">Hospital / Clinic Name</label>
                        <input type="text" name="t7" id="t7" class="form-control form-control-custom" placeholder="Full name of medical facility">
                    </div>
                    <div class="col-12 mb-5">
                        <label for="t8">Physical Address</label>
                        <textarea name="t8" id="t8" class="form-control form-control-custom" rows="3" placeholder="Full facility address"></textarea>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-3">Finalize Provider Registration</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="AdminScreen" class="text-secondary text-decoration-none small"><i class="fa fa-arrow-left me-2"></i>Return to Dashboard</a>
            </div>
        </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
