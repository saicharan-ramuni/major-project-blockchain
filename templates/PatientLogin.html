<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Patient Login | Blockchain-Based anonymous authentication framework for Healthcare IoT</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    
    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/static/css/style.css" rel="stylesheet">
    
    <script>
        function validate(formObj) {
            if (formObj.t1.value.length == 0) {
                alert("Please Enter Patient ID");
                formObj.t1.focus();
                return false;
            }
            if (formObj.t2.value.length == 0) {
                alert("Please Enter Password");
                formObj.t2.focus();
                return false;
            }
            return true;
        }
    </script>
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a href="index" class="navbar-brand d-flex align-items-center">
                <h4 class="m-0"><i class="fa fa-link me-3"></i>Healthcare IoT</h4>
            </a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <div class="navbar-nav ms-auto ps-4">
                    <a href="index" class="nav-item nav-link">Home</a>
                    <a href="AdminLogin" class="nav-item nav-link">Admin</a>
                    <a href="PatientLogin" class="nav-item nav-link active">Patient</a>
                    <a href="DoctorLogin" class="nav-item nav-link">Doctor</a>
                    <a href="PatientSignup" class="btn btn-primary-custom ms-lg-3 mt-2 mt-lg-0">Get Started</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="glass-panel auth-card animate-up">
            <div class="text-center mb-5">
                <div class="icon-box mx-auto">
                    <i class="fa fa-user-injured fa-2x"></i>
                </div>
                <h3 class="mt-3">Patient Portal</h3>
                <p class="text-secondary">Access your secure medical blockchain records</p>
                {% if data %}
                <div class="alert alert-danger bg-transparent border-danger text-danger py-2 mt-3" role="alert">
                    {{ data|safe }}
                </div>
                {% endif %}
            </div>

            <form name="f1" method="post" action='/PatientLoginAction' onsubmit="return validate(this);">
                <div class="mb-4">
                    <label for="t1">Patient Username</label>
                    <input type="text" name="t1" id="t1" class="form-control form-control-custom" placeholder="Enter your username">
                </div>
                <div class="mb-5">
                    <label for="t2">Password</label>
                    <input type="password" name="t2" id="t2" class="form-control form-control-custom" placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-3">Login</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-secondary small mb-2">New patient?</p>
                <a href="PatientSignup" class="text-primary text-decoration-none fw-600">Create an Account</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
