<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Prescription Portal | Healthcare IoT</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    
    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/static/css/style.css" rel="stylesheet">
    
    <script>
        function validate(formObj) {
            if (formObj.t1.value.trim().length == 0) {
                alert("Please enter prescription details");
                formObj.t1.focus();
                return false;
            }
            return true;
        }
    </script>
</head>

<body>
    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a href="DoctorScreen" class="navbar-brand d-flex align-items-center">
                <h4 class="m-0"><i class="fa fa-user-md me-3"></i>Doctor Portal</h4>
            </a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <div class="navbar-nav ms-auto ps-4">
                    <a href="ViewPatientReport" class="nav-item nav-link">View Patient Reports</a>
                    <a href="index" class="btn btn-outline-danger ms-lg-3 mt-2 mt-lg-0 px-4" style="border-radius: 50px;">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Navbar End -->

    <div class="auth-wrapper py-5">
        <div class="glass-panel auth-card animate-up" style="max-width: 800px;">
            <div class="text-center mb-5">
                <div class="icon-box mx-auto text-primary">
                    <i class="fa fa-prescription fa-2x"></i>
                </div>
                <h3 class="mt-3">Patient Prescription</h3>
                <p class="text-secondary">Provide medical advice and treatment plans secured by blockchain</p>
                {% if data %}
                <div class="alert alert-info bg-transparent border-info text-info py-2 mt-3" role="alert">
                    {{ data|safe }}
                </div>
                {% endif %}
            </div>

            <form name="f1" method="post" action='/PrescriptionAction' onsubmit="return validate(this);">
                <div class="mb-5">
                    <label for="t1" class="mb-3 d-flex align-items-center">
                        <i class="fa fa-pen-nib me-2 text-primary"></i> Examination & Treatment Plan
                    </label>
                    <textarea name="t1" id="t1" class="form-control form-control-custom" rows="12" placeholder="Describe symptoms, diagnosis, and prescribed medication..."></textarea>
                    <div class="mt-2 d-flex justify-content-between">
                        <small class="text-secondary">All entries are immutable once submitted.</small>
                        <small class="text-secondary" id="charCount">0 characters</small>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-3 d-flex align-items-center justify-content-center">
                    <i class="fa fa-file-check me-2"></i> Submit Locked Prescription
                </button>
            </form>
            
            <div class="text-center mt-4">
                <a href="ViewPatientReport" class="text-secondary text-decoration-none small"><i class="fa fa-arrow-left me-2"></i>Back to Patient List</a>
            </div>
        </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('t1').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length + ' characters';
        });
    </script>
</body>

</html>
