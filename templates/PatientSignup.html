<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Patient Registration | Blockchain-Based anonymous authentication framework for Healthcare IoT</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    
    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/static/css/style.css" rel="stylesheet">
    
    <script>
        function checkEmail(t3) {
            if (/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(t3)){
                return (true)
            }
            alert("Invalid E-mail Address! Please re-enter.")
            return (false);
        }
        function validate(formObj){
            if(formObj.t1.value.length==0){
                alert("Please Enter username");
                formObj.t1.focus();
                return false;
            }
            if(formObj.t2.value.length==0){
                alert("Please Enter password");
                formObj.t2.focus();
                return false;
            }
            if(formObj.t3.value.length==0){
                alert("Please Enter Email ID");
                formObj.t3.focus();
                return false;
            }
            if(!checkEmail(formObj.t3.value)){
                formObj.t3.focus();
                return false;
            }
            if(formObj.t4.value.length==0){
                alert("Please enter contact no");
                formObj.t4.focus();
                return false;
            }
            if(isNaN(formObj.t4.value)){
                alert("Contact no must be numeric");
                formObj.t4.focus();
                return false;
            }
            if(formObj.t4.value.length != 10){
                alert("Contact number must be 10 digits long");
                formObj.t4.focus();
                return false;
            }
            if(formObj.t5.value.length==0){
                alert("Please enter address");
                formObj.t5.focus();
                return false;
            }	
            return true;
        }
    </script>
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a href="index" class="navbar-brand d-flex align-items-center">
                <h4 class="m-0"><i class="fa fa-link me-3"></i>Healthcare IoT</h4>
            </a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <div class="navbar-nav ms-auto ps-4">
                    <a href="index" class="nav-item nav-link">Home</a>
                    <a href="AdminLogin" class="nav-item nav-link">Admin</a>
                    <a href="PatientLogin" class="nav-item nav-link">Patient</a>
                    <a href="DoctorLogin" class="nav-item nav-link">Doctor</a>
                    <a href="PatientSignup" class="btn btn-primary-custom ms-lg-3 mt-2 mt-lg-0">Get Started</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper py-5">
        <div class="glass-panel auth-card animate-up" style="max-width: 600px;">
            <div class="text-center mb-5">
                <div class="icon-box mx-auto">
                    <i class="fa fa-user-plus fa-2x"></i>
                </div>
                <h3 class="mt-3">Patient Registration</h3>
                <p class="text-secondary">Join the secure blockchain healthcare network</p>
                {% if data %}
                <div class="alert alert-info bg-transparent border-info text-info py-2 mt-3" role="alert">
                    {{ data|safe }}
                </div>
                {% endif %}
            </div>

            <form name="f1" method="post" action='/PatientSignupAction' onsubmit="return validate(this);">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="t1">Username</label>
                        <input type="text" name="t1" id="t1" class="form-control form-control-custom" placeholder="Choose username">
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="t2">Password</label>
                        <input type="password" name="t2" id="t2" class="form-control form-control-custom" placeholder="Set password">
                    </div>
                </div>
                <div class="mb-4">
                    <label for="t3">Email Address</label>
                    <input type="email" name="t3" id="t3" class="form-control form-control-custom" placeholder="name@example.com">
                </div>
                <div class="mb-4">
                    <label for="t4">Contact Number</label>
                    <input type="text" name="t4" id="t4" class="form-control form-control-custom" placeholder="10-digit mobile number">
                </div>
                <div class="mb-5">
                    <label for="t5">Full Address</label>
                    <textarea name="t5" id="t5" class="form-control form-control-custom" rows="3" placeholder="Enter your current address"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-3">Create Secure Account</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-secondary small">Already have an account? <a href="PatientLogin" class="text-primary text-decoration-none fw-600">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
